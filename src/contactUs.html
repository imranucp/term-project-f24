<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Luxury Cars</title>
    <link rel="stylesheet" href="../styles/contactUs.css">
    <link rel="stylesheet" href="../styles/contactUs.css">
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>Contact Us</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contactUs.html">contactUs</a></li>
            </ul>
        </nav>
    </header>

    <!-- Contact Section -->
    <section class="contact">
        <h2>Get in Touch</h2>
        <p>Have any questions? Feel free to reach out to us!</p>
        
        <div class="contact-container">
            <!-- Contact Form -->
            <div class="contact-form">
                <h3>Contact Us</h3>
                <form action="#" method="POST">
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <input type="text" name="phone" placeholder="Your Phone Number">
                    <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>

            <!-- Contact Info -->
            <div class="contact-info">
                <h3>Our Showroom</h3>
                <p>📍 123 Luxury Drive, Car City, USA</p>
                <p>📞 +1 555-123-4567</p>
                <p>✉️ contact@luxurycars.com</p>
                
                <!-- Google Maps Embed -->
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.086520370219!2d-122.41941568468202!3d37.77492977975962!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085809c3f2b9fcd%3A0x6c77447cb9e3e1b5!2sSan+Francisco%2C+CA!5e0!3m2!1sen!2sus!4v1554882948816!5m2!1sen!2sus" 
                    width="100%" 
                    height="250" 
                    frameborder="0" 
                    style="border:0;" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Luxury Cars. All Rights Reserved.</p>
    </footer>

</body>
</html>
