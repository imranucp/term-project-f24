name: workflow-development-ci
on:
  pull_request:
    branches:
      - develop
jobs:
  ci-development:
    runs-on: ubuntu-latest
    steps:
      - name: clone Repo
        uses: actions/checkout@v4
      - name: installing files
        run: |
          npm install --save-dev htmlhint
          npm install --save-dev stylelint
      - name: linting html and css
        run: |
          npx htmlhint "**/*.html"
          npx stylelint "**/*.css"
      - name: build
        run: npx parcel build "./src/index.html" --dist-dir "./dist"  --public-url "./"