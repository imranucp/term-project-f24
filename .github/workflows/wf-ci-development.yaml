name: wf-ci-development
on:
  pull_request:
    branches:
      - develop 
jobs:
  ci-development-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install HTMLHint
        run: npm install --save-dev htmlhint
      - name: Install Stylelint
        run: npm install --save-dev stylelint 
      - name: Lint HTML and CSS
        run: |
          npx htmlhint "**/*.html"
          npx stylelint "**/*.css"
      - name: Test Build Ops
        run: |
          npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"