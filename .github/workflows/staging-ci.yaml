name: Staging CI

on:
  pull_request:
    branches:
      - release
    types: [opened, synchronize]

jobs:
  validate-bugfix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Linting
        run: |
          npm run lint:css
          npm run lint:html

      - name: Run Tests
        run: npm test

      - name: Build Project
        run: npm run build