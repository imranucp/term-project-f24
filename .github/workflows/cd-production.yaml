name: wf-cd-production
on:
  push:
    branches:
      - production 
jobs:
  cd-build-production-job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo 
        uses: actions/checkout@v4
        with:
         ref: ${{github.ref}}
      - name: Create Build Artifacts
        run: |
          npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"
      - name: Upload Production Artifacts
        uses: actions/upload-pages-artifact@v3 
        with:
          path: "./dist"
          name: "production-artifact"
  cd-deploy-production-job:
    needs: "cd-build-production-job"
    environment: "production-env"
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Artifacts 
        uses: actions/deploy-pages@v4 
        with:
          artifact_name: "production-artifact"
          token: ${{github.token}}
    