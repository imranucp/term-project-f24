name: wf-cd-production
on:
  push:
    branches:
      - production

jobs:
  build-production-job:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Website for Production
        run: |
          npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"
          name: "build-artifact-production"

  deploy-production-job:
    needs: build-production-job
    environment: production-env
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    concurrency:
      group: "pages-production"
      cancel-in-progress: false
    steps:
      - name: Deploy Production Artifact
        uses: actions/deploy-pages@v4
        with:
          artifact_name: "build-artifact-production"
