name: wf-pr-validation-production
on:
  pull_request:
    branches:
      - production
jobs:
  lint-job:
    runs-on: ubuntu-latest
    steps: 
      - name: checkout repository
        uses: actions/checkout@v4
      - name: lint HTML and CSS
        run: |
          npx htmlhint "**/*.html"
          npx stylelint "**/*.css"
  build-job:
    needs: lint-job
    runs-on: ubuntu-latest
    steps:
      - name: checkout reporepository
        uses: actions/checkout@v4
      - name: Build with Parcel
        run: npx parcel build "./src/index.html" --dist-dir "./dev" --public-url "./"