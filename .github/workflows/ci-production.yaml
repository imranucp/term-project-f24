name: wf-ci-production
on:
  pull_request:
    branches:
      - production 
jobs:
  ci-production-job:
    runs-on: ubuntu-latest
    steps:
      - name: Chekcout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{github.ref}}
      - name: Lint HTML and CSS
        run: |
          npx htmlhint "**/*.html"
          npx stylelint "**/*.css"
      - name: Test Build Ops
        run: |
          npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"