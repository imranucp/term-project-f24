name: Development CI

on:
  pull_request:
    branches:
      - develop
    paths:
      - 'feature/*'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm install

      - name: Run Linting
        run: npm run lint

      - name: Build Project
        run: npm run build
