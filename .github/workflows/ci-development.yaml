name: wf-ci-development
on:
  pull_request:
    branches:
      - develop
jobs:
  ci-development-job:
   runs-on: unbuntu-latest
   steps:
    - name: checkout Repo
      uses: actions/checkout@v4
    - name: Lint Html and CSS code
      run: |
       npx htmlhint "**/*.html"
       npx stylelint "**/*.css"
    - name: Test Build
      run: |
       npx parcel build "./src/index.html" --dist-dir  "./dist" --public-url "./"
