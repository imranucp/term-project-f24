name: wf-ci-development

on:
  pull_request:
    branches:
      - develop  # Runs on PR to 'develop' branch

jobs:
  ci-development-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install -g htmlhint stylelint parcel-bundler

      - name: Lint HTML and CSS Code
        run: |
          npx htmlhint "**/*.html"
          npx stylelint "**/*.css"

      - name: Test Build
        run: |
          npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"
